name: Create Version Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g., 0.1.00)'
        required: true
        default: '0.1.00'

jobs:
  create-tag:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Extract version from AppVersion.cs
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract only the base version from the Version field (not FullVersion)
            VERSION=$(grep -oP 'public const string Version = "\K[^"]+' src/ProdControlAV.Core/Configuration/AppVersion.cs || echo "0.1.00")
          fi
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: v$VERSION"
          
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.extract_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.extract_version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.extract_version.outputs.version }} does not exist"
          fi
          
      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "${{ steps.extract_version.outputs.version }}" -m "Release ${{ steps.extract_version.outputs.version }}"
          git push origin "${{ steps.extract_version.outputs.version }}"
          echo "Created and pushed tag: ${{ steps.extract_version.outputs.version }}"
          
      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.extract_version.outputs.version }}" \
            --title "Release ${{ steps.extract_version.outputs.version }}" \
            --notes "## Changes in ${{ steps.extract_version.outputs.version }}
            
            Automated release created from main branch.
            
            ### Features
            - JWT Authentication implementation for Agent-API communication
            - Interactive device cards with modal editing
            - Device management with CRUD operations
            - Location field support
            - Delete confirmation workflows
            - Responsive modal centering
            - Menu improvements and version display" \
            --prerelease