name: Build (Docker) & Deploy to Azure Container Apps

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/ProdControlAV.API/**"
      - "src/ProdControlAV.Core/**"
      - "src/ProdControlAV.WebApp/**"
      - "src/ProdControlAV.Infrastructure/**"
      - ".github/workflows/pcav-app-AutoDeployTrigger-be41a6aa-1b02-4412-89cc-41d3c29728ab.yml"
  workflow_dispatch:

env:
  AZURE_REGION: eastus
  RESOURCE_GROUP: ProdControlAV-Group
  CONTAINERAPP_NAME: pcav-app
  CONTAINER_NAME: pcav-app        # internal container name inside your Container App
  IMAGE_NAME: prodcontrolavapi     # repo name in Docker Hub (user is from secret)
  TARGET_PORT: "8080"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Build+push with an immutable tag (commit SHA) and a "rolling" tag (main)
      - name: Docker Hub login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      - name: Build & Push image
        run: |
          IMAGE_SHA="docker.io/${{ secrets.DOCKERHUB_USER }}/prodcontrolavapi:${{ github.sha }}"
          IMAGE_MAIN="docker.io/${{ secrets.DOCKERHUB_USER }}/prodcontrolavapi:main"
          docker build -f Dockerfile -t "$IMAGE_SHA" -t "$IMAGE_MAIN" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_MAIN"
          echo "IMAGE=$IMAGE_SHA" >> $GITHUB_ENV


      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PCAVAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PCAVAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade || az extension update --name containerapp

      # Point the app at the new image and bind to port 80
      - name: Deploy image to Container App
        run: |
          az containerapp update \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ env.CONTAINER_NAME }}" \
            --image "${{ env.IMAGE }}" \
            --set-env-vars ASPNETCORE_URLS=http://+:${{ env.TARGET_PORT }}

      # Ensure DB secret & EF connection string mapping
      - name: Set DB secret & env
        run: |
          az containerapp secret set \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --secrets db-connstr='${{ secrets.SQL_CONNECTION_STRING }}'
          az containerapp update \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ env.CONTAINER_NAME }}" \
            --set-env-vars ConnectionStrings__DefaultConnection=secretref:db-connstr





