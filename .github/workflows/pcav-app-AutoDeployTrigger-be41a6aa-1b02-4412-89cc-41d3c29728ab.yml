name: Build & Deploy API (Source → Azure Container Apps)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/ProdControlAV.API/**"
      - ".github/workflows/aca-source-deploy.yml"
  workflow_dispatch:

env:
  AZURE_REGION: eastus
  RESOURCE_GROUP: ProdControlAV-Group
  CONTAINERAPP_NAME: pcav-app
  APP_SOURCE_PATH: src/ProdControlAV.API
  TARGET_PORT: "80"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Diagnostics to catch path/layout issues quickly ----
      - name: Show repo layout
        run: |
          pwd
          ls -la
          echo "--- API dir ---"
          ls -la ${{ env.APP_SOURCE_PATH }}

      # Ensure we are not triggering Docker/ACR path (no Dockerfile in API dir)
      - name: Ensure no Dockerfile in API path
        run: |
          if [ -f "${{ env.APP_SOURCE_PATH }}/Dockerfile" ]; then
            echo "::error::Dockerfile found in ${{ env.APP_SOURCE_PATH }}. Rename or remove it to force Oryx source build."
            exit 1
          fi

      # Pin .NET SDK so Oryx picks the same version as your local box
      - name: Add/Update global.json (pin .NET SDK)
        run: |
          echo '{ "sdk": { "version": "8.0.402", "rollForward": "latestFeature" } }' > global.json
          cat global.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Dotnet info
        run: dotnet --info

      # ---- Build locally in CI first to surface restore/build issues early ----
      - name: Restore
        run: dotnet restore ${{ env.APP_SOURCE_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.APP_SOURCE_PATH }} -c Release --no-restore

      - name: Publish (Release) - sanity check
        run: dotnet publish ${{ env.APP_SOURCE_PATH }} -c Release -o out --no-restore
      # ---------------------------------------------------------

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PCAVAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PCAVAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription "${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}"

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade || az extension update --name containerapp
          az config set extension.use_dynamic_install=yes_without_prompt

      # Oryx/buildpacks source build & deploy (no Dockerfile, so no ACR)
      - name: Build & Deploy (source) to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINERAPP_NAME }}
          location: ${{ env.AZURE_REGION }}
          appSourcePath: ${{ env.APP_SOURCE_PATH }}
          targetPort: ${{ env.TARGET_PORT }}
          ingress: external
          # keep environmentVariables empty here to avoid --container-name conflicts

      # Resolve internal container name (needed for subsequent az update)
      - name: Resolve internal container name
        id: cname
        run: |
          NAME=$(az containerapp show -n "${{ env.CONTAINERAPP_NAME }}" -g "${{ env.RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].name" -o tsv)
          echo "container_name=$NAME" >> $GITHUB_OUTPUT
          echo "Resolved container name: $NAME"

      # Secret & envs
      - name: Set DB secret
        run: |
          az containerapp secret set \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --secrets db-connstr='${{ secrets.SQL_CONNECTION_STRING }}'

      - name: Apply env vars (bind to 80 + EF conn)
        run: |
          az containerapp update \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ steps.cname.outputs.container_name }}" \
            --set-env-vars \
              ASPNETCORE_URLS=http://+:${{ env.TARGET_PORT }} \
              ConnectionStrings__DefaultConnection=secretref:db-connstr
