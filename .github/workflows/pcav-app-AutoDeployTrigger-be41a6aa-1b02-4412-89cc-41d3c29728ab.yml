name: Build & Deploy API (Source → Azure Container Apps)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/ProdControlAV.API/**"
      - ".github/workflows/aca-source-deploy.yml"
  workflow_dispatch:

env:
  AZURE_REGION: eastus
  RESOURCE_GROUP: prodcontrolav-rg          # <-- keep this consistent everywhere
  CONTAINERAPP_NAME: prodcontrolav-api      # <-- the actual Container App name in Azure
  APP_SOURCE_PATH: src/ProdControlAV.API    # <-- path to your API project
  TARGET_PORT: "8080"                       # <-- change to 5000 if that’s your Target port

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sanity check Azure CLI
        run: |
          az account show
          az version

      - name: Ensure provider & extension
        run: |
          az provider register --namespace Microsoft.App --wait
          az extension add --name containerapp --upgrade || az extension update --name containerapp
          az config set extension.use_dynamic_install=yes_without_prompt

      - name: Ensure Resource Group exists
        run: |
          az group show -n ${{ env.RESOURCE_GROUP }} || az group create -n ${{ env.RESOURCE_GROUP }} -l ${{ env.AZURE_REGION }}

      # Build from source and deploy (Oryx/buildpacks)
      - name: Build & Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINERAPP_NAME }}
          location: ${{ env.AZURE_REGION }}
          appSourcePath: ${{ env.APP_SOURCE_PATH }}
          targetPort: ${{ env.TARGET_PORT }}
          ingress: external
          environmentVariables: |
            ASPNETCORE_URLS=http://+:${{ env.TARGET_PORT }}

      # Apply DB secret and bind EF connection string
      - name: Apply secret & env vars
        run: |
          az containerapp secret set \
            -n ${{ env.CONTAINERAPP_NAME }} \
            -g ${{ env.RESOURCE_GROUP }} \
            --secrets db-connstr='${{ secrets.SQL_CONNECTION_STRING }}'

          az containerapp update \
            -n ${{ env.CONTAINERAPP_NAME }} \
            -g ${{ env.RESOURCE_GROUP }} \
            --set-env-vars ConnectionStrings__DefaultConnection=secretref:db-connstr
