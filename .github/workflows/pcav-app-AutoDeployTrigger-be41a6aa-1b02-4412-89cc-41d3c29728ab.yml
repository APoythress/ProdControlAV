name: Build & Deploy API (Source → Azure Container Apps)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - ".github/workflows/aca-source-deploy.yml"
  workflow_dispatch:

env:
  AZURE_REGION: eastus
  RESOURCE_GROUP: ProdControlAV-Group
  CONTAINERAPP_NAME: pcav-app
  APP_SOURCE_PATH: src                 # ⬅️ build context trimmed to src/
  TARGET_PORT: "80"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo layout
        run: |
          pwd
          du -sh . | sed 's/^/repo size: /'
          ls -la
          echo "--- src ---"
          ls -la src || true

      # Make sure no Dockerfile is in build context (forces pure Oryx build)
      - name: Ensure no Dockerfile in context
        run: |
          test ! -f "Dockerfile" || (echo "::error::Dockerfile at repo root; remove/rename" && exit 1)
          test ! -f "src/ProdControlAV.API/Dockerfile" || (echo "::error::Dockerfile in API dir; remove/rename" && exit 1)

      # Pin SDK so Oryx and local match
      - name: Add/Update global.json
        run: |
          echo '{ "sdk": { "version": "8.0.402", "rollForward": "latestFeature" } }' > global.json
          cat global.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Local sanity build (to surface errors early) → publish to /tmp, not the repo
      - name: Restore
        run: dotnet restore src/ProdControlAV.API/ProdControlAV.API.csproj

      - name: Build (Release)
        run: dotnet build src/ProdControlAV.API/ProdControlAV.API.csproj -c Release --no-restore

      - name: Publish to temp (Release)
        run: dotnet publish src/ProdControlAV.API/ProdControlAV.API.csproj -c Release -o /tmp/publish --no-restore

      # Exclude heavy folders from Oryx upload
      - name: Create .oryxignore
        run: |
          cat > .oryxignore << 'EOF'
          # Exclude large/unneeded dirs from source upload
          **/bin/
          **/obj/
          **/out/
          **/node_modules/
          .git/
          .github/
          /tmp/
          EOF
          echo "--- .oryxignore ---"; cat .oryxignore

      # Extra safety: remove any stray out/bin/obj in the repo (not needed for source build)
      - name: Prune build artifacts
        run: |
          rm -rf out || true
          find . -type d -name bin -prune -exec rm -rf {} + || true
          find . -type d -name obj -prune -exec rm -rf {} + || true

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PCAVAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PCAVAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription "${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}"

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade || az extension update --name containerapp
          az config set extension.use_dynamic_install=yes_without_prompt

      # Build from src/ (contains API + Core + Infra), tell buildpack which project to publish
      - name: Build & Deploy (source) to Container Apps
        uses: azure/container-apps-deploy-action@v2
        env:
          BP_DOTNET_PROJECT_PATH: ProdControlAV.API   # relative to APP_SOURCE_PATH (src/)
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINERAPP_NAME }}
          location: ${{ env.AZURE_REGION }}
          appSourcePath: ${{ env.APP_SOURCE_PATH }}
          targetPort: ${{ env.TARGET_PORT }}
          ingress: external

      # Resolve internal container name
      - name: Resolve internal container name
        id: cname
        run: |
          NAME=$(az containerapp show -n "${{ env.CONTAINERAPP_NAME }}" -g "${{ env.RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].name" -o tsv)
          echo "container_name=$NAME" >> $GITHUB_OUTPUT
          echo "Resolved container name: $NAME"

      # Secret & envs
      - name: Set DB secret
        run: |
          az containerapp secret set \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --secrets db-connstr='${{ secrets.SQL_CONNECTION_STRING }}'

      - name: Apply env vars (bind to 80 + EF conn)
        run: |
          az containerapp update \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ steps.cname.outputs.container_name }}" \
            --set-env-vars \
              ASPNETCORE_URLS=http://+:${{ env.TARGET_PORT }} \
              ConnectionStrings__DefaultConnection=secretref:db-connstr
