name: Build & Deploy API (Source → Azure Container Apps)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - ".github/workflows/aca-source-deploy.yml"
  workflow_dispatch:

env:
  AZURE_REGION: eastus
  RESOURCE_GROUP: ProdControlAV-Group
  CONTAINERAPP_NAME: pcav-app
  APP_SOURCE_PATH: .                 # <-- build from repo root so ProjectReferences resolve
  TARGET_PORT: "80"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo layout
        run: |
          pwd
          ls -la
          echo "--- src ---"
          ls -la src || true
          echo "--- API dir ---"
          ls -la src/ProdControlAV.API || true

      # Ensure we don’t trigger the ACR/Docker path:
      - name: Ensure no Dockerfile at repo root or API dir
        run: |
          test ! -f "Dockerfile" || (echo "::error::Dockerfile found at repo root. Rename/remove to force Oryx build." && exit 1)
          test ! -f "src/ProdControlAV.API/Dockerfile" || (echo "::error::Dockerfile found in API dir. Rename/remove to force Oryx build." && exit 1)

      # Pin SDK so Oryx uses the same .NET as local
      - name: Add/Update global.json
        run: |
          echo '{ "sdk": { "version": "8.0.402", "rollForward": "latestFeature" } }' > global.json
          cat global.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Local CI sanity build (uses full repo)
        run: |
          dotnet restore src/ProdControlAV.API/ProdControlAV.API.csproj
          dotnet build src/ProdControlAV.API/ProdControlAV.API.csproj -c Release --no-restore
          dotnet publish src/ProdControlAV.API/ProdControlAV.API.csproj -c Release -o out --no-restore

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PCAVAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PCAVAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription "${{ secrets.PCAVAPP_AZURE_SUBSCRIPTION_ID }}"

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade || az extension update --name containerapp
          az config set extension.use_dynamic_install=yes_without_prompt

      # Build from repo root, but tell the buildpack which project to publish.
      - name: Build & Deploy (source) to Container Apps
        uses: azure/container-apps-deploy-action@v2
        env:
          BP_DOTNET_PROJECT_PATH: src/ProdControlAV.API   # <-- select the API project for the buildpack
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINERAPP_NAME }}
          location: ${{ env.AZURE_REGION }}
          appSourcePath: ${{ env.APP_SOURCE_PATH }}
          targetPort: ${{ env.TARGET_PORT }}
          ingress: external
          # Some versions of the action support:
          # buildEnvironmentVariables: |
          #   BP_DOTNET_PROJECT_PATH=src/ProdControlAV.API

      # Resolve internal container name for updates
      - name: Resolve internal container name
        id: cname
        run: |
          NAME=$(az containerapp show -n "${{ env.CONTAINERAPP_NAME }}" -g "${{ env.RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].name" -o tsv)
          echo "container_name=$NAME" >> $GITHUB_OUTPUT
          echo "Resolved container name: $NAME"

      # Secret & env
      - name: Set DB secret
        run: |
          az containerapp secret set \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --secrets db-connstr='${{ secrets.SQL_CONNECTION_STRING }}'

      - name: Apply env vars (bind to 80 + EF conn)
        run: |
          az containerapp update \
            -n "${{ env.CONTAINERAPP_NAME }}" \
            -g "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ steps.cname.outputs.container_name }}" \
            --set-env-vars \
              ASPNETCORE_URLS=http://+:${{ env.TARGET_PORT }} \
              ConnectionStrings__DefaultConnection=secretref:db-connstr
